<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Bejelentkezés</mat-card-title>
      <mat-card-subtitle>Lépjen be a rendszerbe</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Felhasználónév</mat-label>
          <input matInput formControlName="username" placeholder="pl. gabor123">
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            A felhasználónév megadása kötelező
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Jelszó</mat-label>
          <input matInput type="password" formControlName="password" placeholder="********">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            A jelszó megadása kötelező
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="login-button"
          [disabled]="loading || loginForm.invalid">
          {{ loading ? 'Bejelentkezés...' : 'Belépés' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
