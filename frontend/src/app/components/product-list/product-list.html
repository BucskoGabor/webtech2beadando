<mat-toolbar color="primary" class="dashboard-toolbar">
  <span>Nyilvántartó Rendszer</span>
  <span class="spacer"></span>
  <span class="user-greeting">Üdv, {{ username }}!</span>
  <button mat-icon-button (click)="logout()" title="Kijelentkezés">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<div class="dashboard-container">
  <div class="header-actions">
    <h1>Termékek Listája</h1>
    <button mat-raised-button color="accent" (click)="openAddProductDialog()">
      <mat-icon>add</mat-icon> Új termék hozzáadása
    </button>
  </div>

  <div class="table-card mat-elevation-z8">
    <table mat-table [dataSource]="products" class="full-width-table">
      
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Megnevezés </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef> Kategória </th>
        <td mat-cell *matCellDef="let element"> {{element.category}} </td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef> Ár (Ft) </th>
        <td mat-cell *matCellDef="let element"> {{element.price | number}} </td>
      </ng-container>

      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef> Készlet </th>
        <td mat-cell *matCellDef="let element"> {{element.stock}} </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef> Létrehozva </th>
        <td mat-cell *matCellDef="let element"> {{element.createdAt | date:'short'}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Műveletek </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="primary" (click)="editProduct(element)" title="Módosítás">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteProduct(element)" title="Törlés">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div *ngIf="products.length === 0" class="no-data">
      Nincsenek rögzített termékek.
    </div>
  </div>
</div>
