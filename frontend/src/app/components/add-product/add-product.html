<h2 mat-dialog-title>{{ isEditMode ? 'Termék módosítása' : 'Új termék hozzáadása' }}</h2>
<mat-dialog-content>
  <form [formGroup]="productForm" id="addProductForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Termék neve</mat-label>
      <input matInput formControlName="name" placeholder="pl. MacBook Air">
      <mat-error *ngIf="productForm.get('name')?.hasError('required')">
        A név megadása kötelező
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Kategória</mat-label>
      <input matInput formControlName="category" placeholder="pl. Elektronika">
      <mat-error *ngIf="productForm.get('category')?.hasError('required')">
        A kategória megadása kötelező
      </mat-error>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Ár (Ft)</mat-label>
        <input matInput type="number" formControlName="price" placeholder="0">
        <mat-error *ngIf="productForm.get('price')?.hasError('required')">
          Az ár megadása kötelező
        </mat-error>
        <mat-error *ngIf="productForm.get('price')?.hasError('pattern')">
          Érvényes számot adjon meg!
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Készlet</mat-label>
        <input matInput type="number" formControlName="stock" placeholder="0">
        <mat-error *ngIf="productForm.get('stock')?.hasError('required')">
          A készlet megadása kötelező
        </mat-error>
        <mat-error *ngIf="productForm.get('stock')?.hasError('min')">
          A készlet nem lehet negatív!
        </mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Leírás (opcionális)</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Mégse</button>
  <button mat-raised-button color="primary" form="addProductForm" [disabled]="loading || productForm.invalid">
    {{ loading ? 'Mentés...' : (isEditMode ? 'Módosítás' : 'Hozzáadás') }}
  </button>
</mat-dialog-actions>
